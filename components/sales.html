<section id="page-sales" class="page hidden">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="font-display text-5xl text-terra mt-2">Sales</h1>

    <p class="mt-3 text-gray-500">
      Create orders and manage customer purchases.
    </p>
  </div>

  <div class="flex gap-8 h-full">
    <!-- MENU AREA -->
    <div class="flex-1">
      <!-- Categories -->
      <div class="flex flex-wrap gap-3 mb-6">
        <button
          onclick="filterCat('all')"
          data-cat="all"
          class="cat-btn active-cat">
          All Menu
        </button>

        <button onclick="filterCat('Food')" data-cat="Food" class="cat-btn">
          Food
        </button>

        <button onclick="filterCat('Snack')" data-cat="Snack" class="cat-btn">
          Snack
        </button>

        <button
          onclick="filterCat('Beverage')"
          data-cat="Beverage"
          class="cat-btn">
          Beverage
        </button>
      </div>

      <!-- Menu Grid -->
      <div id="menuGrid" class="grid md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
    </div>

    <!-- CART -->
    <aside class="w-[380px] flex-shrink-0 card-premium p-6 flex flex-col">
      <div class="mb-6">
        <p class="uppercase tracking-[0.2em] text-xs text-gray-400">
          Current Order
        </p>

        <h3 class="font-display text-3xl text-forest">Cart</h3>
      </div>

      <div id="cartItems" class="flex-1 overflow-y-auto space-y-3"></div>

      <div class="border-t border-[#E5DDD3] mt-6 pt-6">
        <div class="flex justify-between mb-2">
          <span class="text-gray-500"> Subtotal </span>

          <span id="cartSubtotal"> Rp 0 </span>
        </div>

        <div class="flex justify-between mb-4">
          <span class="text-gray-500"> Tax (10%) </span>

          <span id="cartTax"> Rp 0 </span>
        </div>

        <div class="flex justify-between text-xl font-semibold">
          <span> Total </span>

          <span id="cartTotal" class="text-forest"> Rp 0 </span>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mt-6">
        <button onclick="clearCart()" class="btn-secondary">Clear</button>

        <button onclick="openPayment()" class="btn-primary">Checkout</button>
      </div>
    </aside>
  </div>
</section>
<style>
  .cat-btn {
    padding: 10px 20px;
    border: 1px solid #d9cfc4;
    background: white;
    color: #555;
    transition: 0.3s;
  }

  .active-cat {
    background: #0f4d21;
    color: white;
    border-color: #0f4d21;
  }

  .card-premium {
    background: white;
    border: 1px solid #e9dfd5;
    border-radius: 24px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
  }

  .btn-primary {
    background: #0f4d21;
    color: white;
    padding: 14px;
  }

  .btn-primary:hover {
    background: #2d6a4f;
  }

  .btn-secondary {
    border: 1px solid #d9cfc4;
    padding: 14px;
  }

  .qty-btn {
    width: 32px;
    height: 32px;
    border: 1px solid #d9cfc4;
    border-radius: 999px;
  }
</style>
