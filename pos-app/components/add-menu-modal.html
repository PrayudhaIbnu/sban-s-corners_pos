<!-- Add Menu Modal -->
<div id="addMenuModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm mx-4 max-h-[90vh] overflow-y-auto">
    <h3 class="font-brand text-xl text-forest mb-4">Add Menu Item</h3>
    <form id="addMenuForm" class="space-y-3">
      <div>
        <label class="text-sm font-medium text-gray-700">Name</label>
        <input id="menuName" type="text" required class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg outline-none text-sm">
      </div>
      <div>
        <label class="text-sm font-medium text-gray-700">Category</label>
        <select id="menuCat" class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg outline-none text-sm">
          <option value="Food">Food</option>
          <option value="Snack">Snack</option>
          <option value="Beverage">Beverage</option>
        </select>
      </div>
      <div>
        <label class="text-sm font-medium text-gray-700">Price (Rp)</label>
        <input id="menuPrice" type="number" required class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg outline-none text-sm">
      </div>
      <div>
        <label class="text-sm font-medium text-gray-700">Stock</label>
        <input id="menuStock" type="number" required class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg outline-none text-sm">
      </div>
      <div>
        <label class="text-sm font-medium text-gray-700 flex items-center gap-1">
          <i data-lucide="image" class="w-3.5 h-3.5"></i>
          Image URL/Path (optional)
        </label>
        <input id="menuImage" type="text" placeholder="./assets/images/products/..." class="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg outline-none text-sm">
        <p class="text-[10px] text-gray-400 mt-1">Kosongkan untuk menggunakan icon default</p>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="button" onclick="closeAddMenu()" class="flex-1 py-2 border border-gray-300 rounded-lg text-sm font-medium">Cancel</button>
        <button type="submit" class="flex-1 py-2 bg-forest text-white rounded-lg text-sm font-medium">Add</button>
      </div>
    </form>
  </div>
</div>
