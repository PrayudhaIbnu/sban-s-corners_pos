<!-- MOBILE HEADER -->
<header
  class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-forest h-14 flex items-center justify-between px-4 shadow-md">
  <button onclick="toggleSidebar()" class="text-white">
    <i data-lucide="menu" class="w-6 h-6"></i>
  </button>
  <h2 class="font-brand text-lg text-white" id="sidebarBrandMobile">
    SBAN'S CORNER
  </h2>

  <!-- ⚠️ BARU: Tombol Cart di Header Mobile -->
  <button
    id="headerCartBtn"
    onclick="openCartFromHeader()"
    class="text-white relative hidden"
    style="display: none">
    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
    <span
      id="headerCartBadge"
      class="absolute -top-2 -right-2 bg-terra text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-forest">
      0
    </span>
  </button>

  <!-- Spacer untuk keseimbangan layout -->
  <div id="headerCartSpacer" class="w-6"></div>
</header>

<!-- OVERLAY -->
<div
  id="sidebarOverlay"
  onclick="closeSidebar()"
  class="hidden fixed inset-0 bg-black/40 z-40 transition-opacity"></div>

<!-- Sidebar -->
<nav
  id="sidebar"
  class="fixed lg:static top-0 left-0 h-full lg:h-auto w-56 bg-forest flex-shrink-0 flex flex-col p-4 z-50 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out pt-16 lg:pt-4">
  <h2
    class="font-brand text-xl text-white mb-8 px-2 hidden lg:block"
    id="sidebarBrand">
    SBAN'S CORNER
  </h2>
  <div class="space-y-1 flex-1 overflow-y-auto">
    <button
      onclick="navigate('dashboard')"
      data-nav="dashboard"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 hover:bg-white/10 transition text-sm font-medium">
      <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
    </button>
    <button
      onclick="navigate('reservations')"
      data-nav="reservations"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 hover:bg-white/10 transition text-sm font-medium relative">
      <i data-lucide="calendar-check" class="w-4 h-4"></i>
      <span>Reservasi</span>
      <span
        id="reservationsBadge"
        class="hidden ml-auto bg-terra text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center">
        0
      </span>
    </button>
    <button
      onclick="navigate('sales')"
      data-nav="sales"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 hover:bg-white/10 transition text-sm font-medium">
      <i data-lucide="shopping-cart" class="w-4 h-4"></i> Sales
    </button>
    <button
      onclick="navigate('orders')"
      data-nav="orders"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 hover:bg-white/10 transition text-sm font-medium relative">
      <i data-lucide="clipboard-list" class="w-4 h-4"></i>
      <span>Orders</span>
      <span
        id="ordersBadge"
        class="hidden ml-auto bg-terra text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center"
        >0</span
      >
    </button>
    <button
      onclick="navigate('inventory')"
      data-nav="inventory"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 hover:bg-white/10 transition text-sm font-medium">
      <i data-lucide="package" class="w-4 h-4"></i> Inventory
    </button>
    <button
      onclick="navigate('reports')"
      data-nav="reports"
      class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 hover:bg-white/10 transition text-sm font-medium">
      <i data-lucide="file-text" class="w-4 h-4"></i> Reports
    </button>
  </div>

  <!-- Tombol Developer Tools -->
  <div class="border-t border-white/10 pt-3 mt-3 space-y-1">
    <button
      onclick="loadDummyTransactions()"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-white/50 hover:bg-white/10 transition text-xs w-full"
      title="Tambah data dummy untuk testing">
      <i data-lucide="database" class="w-3.5 h-3.5"></i> Load Dummy Data
    </button>
    <button
      onclick="clearAllTransactions()"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-white/50 hover:bg-white/10 transition text-xs w-full"
      title="Hapus semua data transaksi">
      <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Reset Data
    </button>
    <button
      onclick="logout()"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/50 hover:bg-white/10 transition text-sm w-full">
      <i data-lucide="log-out" class="w-4 h-4"></i> Logout
    </button>
  </div>
</nav>

<style>
  /* Sidebar link styles */
  .sidebar-link {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 18px;
    color: rgba(255, 255, 255, 0.65);
    transition: 0.3s;
  }

  .sidebar-link svg {
    width: 18px;
    height: 18px;
  }

  .sidebar-link:hover {
    background: rgba(255, 255, 255, 0.08);
    color: white;
  }

  .sidebar-link.active {
    background: white;
    color: #0f4d21;
  }

  .sidebar-link.active svg {
    color: #0f4d21;
  }

  /* Nav item styles */
  .nav-item {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 16px;
    color: rgba(255, 255, 255, 0.7);
    transition: 0.3s;
  }

  .nav-item:hover {
    background: rgba(255, 255, 255, 0.08);
    color: white;
  }

  .nav-btn.active {
    background: rgba(255, 255, 255, 0.12);
    color: white;
  }

  /* Mobile bottom nav button */
  .mobile-nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    transition: color 0.2s;
  }

  .mobile-nav-btn.active {
    color: #0f4d21;
  }

  .mobile-nav-btn:hover {
    color: #0f4d21;
  }

  /* Scrollbar untuk sidebar di mobile */
  #sidebar .overflow-y-auto::-webkit-scrollbar {
    width: 4px;
  }

  #sidebar .overflow-y-auto::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 2px;
  }
</style>
