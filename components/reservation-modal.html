<div
  id="reservationModal"
  class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
  <div
    class="bg-white rounded-[32px] w-full max-w-2xl shadow-2xl animate-fade-in overflow-hidden">
    <!-- HEADER -->
    <div
      class="bg-gradient-to-r from-forest to-[#14632d] px-8 py-6 flex justify-between items-center">
      <div>
        <p class="text-white/60 text-xs uppercase tracking-[0.3em]">
          Reservation
        </p>

        <h2 class="font-display text-3xl text-terra mt-1">New Reservation</h2>
      </div>

      <button
        onclick="closeReservationModal()"
        class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white">
        ✕
      </button>
    </div>

    <!-- BODY -->
    <div class="p-8">
      <!-- TABLE + GUEST -->
      <div class="grid md:grid-cols-2 gap-5">
        <div>
          <label class="label-premium"> Table </label>

          <select id="reservationTableId" class="input-premium"></select>
        </div>

        <div>
          <label class="label-premium"> Guests </label>

          <input
            id="guestCount"
            type="number"
            min="1"
            placeholder="4"
            class="input-premium" />
        </div>
      </div>

      <!-- CUSTOMER -->
      <div class="mt-5">
        <label class="label-premium"> Customer Name </label>

        <input
          id="customerName"
          type="text"
          placeholder="John Doe"
          class="input-premium" />
      </div>

      <!-- DATE + TIME -->
      <div class="grid md:grid-cols-2 gap-5 mt-5">
        <div>
          <label class="label-premium"> Reservation Date </label>

          <input id="reservationDate" type="date" class="input-premium" />
        </div>

        <div>
          <label class="label-premium"> Reservation Time </label>

          <input id="reservationTime" type="time" class="input-premium" />
        </div>
      </div>

      <!-- NOTE -->
      <div class="mt-5">
        <label class="label-premium"> Notes </label>

        <textarea
          id="reservationNote"
          class="input-premium h-28 resize-none"
          placeholder="Birthday celebration, VIP customer, near window, etc."></textarea>
      </div>
    </div>

    <!-- FOOTER -->
    <div
      class="bg-[#FAF7F2] border-t border-[#E5DDD3] p-6 flex justify-end gap-3">
      <button onclick="closeReservationModal()" class="btn-secondary px-8">
        Cancel
      </button>

      <button onclick="saveReservation()" class="btn-primary px-8">
        Save Reservation
      </button>
    </div>
  </div>
</div>
<style>
  .label-premium {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #6b7280;
  }

  .input-premium {
    width: 100%;
    height: 52px;

    padding: 0 16px;

    border: 1px solid #e5ddd3;
    border-radius: 16px;

    background: #fff;

    transition: all 0.2s ease;
  }

  textarea.input-premium {
    height: auto;
    padding: 14px 16px;
  }

  .input-premium:focus {
    outline: none;

    border-color: #0f4d21;

    box-shadow: 0 0 0 4px rgba(15, 77, 33, 0.08);
  }
</style>
