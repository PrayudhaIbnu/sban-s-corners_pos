<!-- MOBILE HEADER -->
<header
  class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-forest h-14 flex items-center justify-between px-4">
  <button onclick="toggleSidebar()">
    <i data-lucide="menu" class="w-6 h-6 text-white"> </i>
  </button>
</header>

<!-- OVERLAY -->
<div
  id="sidebarOverlay"
  onclick="closeSidebar()"
  class="hidden fixed inset-0 bg-black/40 z-40"></div>

<!-- SIDEBAR -->
<nav
  id="sidebar"
  class="fixed lg:relative top-0 left-0 z-50 h-screen w-72 bg-forest flex flex-col p-6 -translate-x-full lg:translate-x-0 transition-transform duration-300">
  <div class="mb-10">
    <h2 class="font-display text-3xl text-terra">
      SBAN'S
      <br />
      CORNER
    </h2>

    <p class="text-white/50 text-xs mt-2 uppercase tracking-widest">
      Point Of Sale
    </p>
  </div>

  <div class="space-y-2 flex-1">
    <button
      onclick="navigate('dashboard')"
      data-nav="dashboard"
      class="nav-btn nav-item">
      <i data-lucide="layout-dashboard"></i>
      Dashboard
    </button>

    <button
      onclick="navigate('reservation')"
      data-nav="reservation"
      class="nav-btn nav-item">
      <i data-lucide="calendar-days"></i>

      Reservations
    </button>

    <button
      onclick="navigate('sales')"
      data-nav="sales"
      class="nav-btn nav-item">
      <i data-lucide="shopping-cart"></i>
      Sales
    </button>

    <button
      onclick="navigate('inventory')"
      data-nav="inventory"
      class="nav-btn nav-item">
      <i data-lucide="package"></i>
      Inventory
    </button>

    <button
      onclick="navigate('reports')"
      data-nav="reports"
      class="nav-btn nav-item">
      <i data-lucide="bar-chart-3"></i>
      Reports
    </button>
  </div>

  <button onclick="logout()" class="nav-item text-white/60">
    <i data-lucide="log-out"></i>
    Logout
  </button>
</nav>

<nav
  class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t h-16 flex z-40">
  <button onclick="navigate('dashboard')" class="mobile-nav-btn">
    <i data-lucide="layout-dashboard"></i>
  </button>

  <button onclick="navigate('sales')" class="mobile-nav-btn">
    <i data-lucide="shopping-cart"></i>
  </button>

  <button onclick="navigate('inventory')" class="mobile-nav-btn">
    <i data-lucide="package"></i>
  </button>

  <button onclick="navigate('reports')" class="mobile-nav-btn">
    <i data-lucide="bar-chart-3"></i>
  </button>
</nav>

<style>
  .sidebar-link {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;

    padding: 14px 18px;

    border-radius: 18px;

    color: rgba(255, 255, 255, 0.65);

    transition: 0.3s;
  }

  .sidebar-link svg {
    width: 18px;
    height: 18px;
  }

  .sidebar-link:hover {
    background: rgba(255, 255, 255, 0.08);
    color: white;
  }

  .sidebar-link.active {
    background: white;
    color: #0f4d21;
  }

  .sidebar-link.active svg {
    color: #0f4d21;
  }

  .nav-item {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;

    padding: 14px 16px;

    border-radius: 16px;

    color: rgba(255, 255, 255, 0.7);

    transition: 0.3s;
  }

  .nav-item:hover {
    background: rgba(255, 255, 255, 0.08);
    color: white;
  }

  .nav-btn.active {
    background: rgba(255, 255, 255, 0.12);
    color: white;
  }

  .mobile-nav-btn {
    flex: 1;

    display: flex;
    align-items: center;
    justify-content: center;

    color: #0f4d21;
  }
</style>
