<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservasi Meja - Sban's Corner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .font-brand { font-family: 'Playfair Display', serif; }
    .table-card {
      transition: all 0.3s ease;
    }
    .table-card:hover:not(.reserved) {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(27, 67, 50, 0.15);
    }
    .table-card.reserved {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .table-card.selected {
      border-color: #1B4332;
      background: #F0FDF4;
    }
  </style>
</head>
<body class="bg-cream min-h-screen">
  
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 text-forest">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        <span class="font-brand text-xl">SBAN'S CORNER</span>
      </a>
      <div class="flex items-center gap-2 text-sm text-gray-600">
        <i data-lucide="calendar" class="w-4 h-4"></i>
        <span>Step 1 of 4</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="font-brand text-3xl text-forest mb-2">Reservasi Meja</h1>
    <p class="text-gray-600 mb-8">Pilih tanggal, waktu, dan meja yang Anda inginkan</p>

    <!-- Form -->
    <form id="reservationForm" class="space-y-8">
      
      <!-- Date & Time -->
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
          <i data-lucide="calendar-clock" class="w-5 h-5 text-forest"></i>
          Tanggal & Waktu
        </h2>
        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Tanggal</label>
            <input 
              type="date" 
              id="resDate" 
              required
              class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-forest focus:border-transparent outline-none"
            >
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Jam Mulai</label>
            <select 
              id="resTime" 
              required
              class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-forest focus:border-transparent outline-none"
            >
              <option value="">Pilih jam</option>
              <!-- Options will be generated by JS -->
            </select>
          </div>
        </div>
      </div>

      <!-- Guest Count -->
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
          <i data-lucide="users" class="w-5 h-5 text-forest"></i>
          Jumlah Tamu
        </h2>
        <div class="flex items-center gap-4">
          <button type="button" onclick="updateGuestCount(-1)" class="w-12 h-12 rounded-full border-2 border-gray-200 flex items-center justify-center hover:border-forest transition">
            <i data-lucide="minus" class="w-5 h-5"></i>
          </button>
          <div class="flex-1 text-center">
            <span id="guestCount" class="text-4xl font-bold text-forest">2</span>
            <p class="text-sm text-gray-500 mt-1">orang (maksimal 6)</p>
          </div>
          <button type="button" onclick="updateGuestCount(1)" class="w-12 h-12 rounded-full border-2 border-gray-200 flex items-center justify-center hover:border-forest transition">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </button>
        </div>
      </div>

      <!-- Table Selection -->
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
          <i data-lucide="grid-3x3" class="w-5 h-5 text-forest"></i>
          Pilih Meja
        </h2>
        <div class="mb-4 flex items-center gap-4 text-sm">
          <div class="flex items-center gap-2">
            <div class="w-4 h-4 bg-green-100 border-2 border-green-500 rounded"></div>
            <span>Tersedia</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-4 h-4 bg-gray-200 border-2 border-gray-400 rounded"></div>
            <span>Tidak Kosong</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-4 h-4 bg-forest border-2 border-forest rounded"></div>
            <span>Dipilih</span>
          </div>
        </div>
        <div id="tableGrid" class="grid grid-cols-4 md:grid-cols-8 gap-3">
          <!-- Tables will be generated by JS -->
        </div>
        <div id="tableInfo" class="mt-4 p-4 bg-cream rounded-lg hidden">
          <!-- Table info will be shown here -->
        </div>
      </div>

      <!-- Customer Info -->
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
          <i data-lucide="user" class="w-5 h-5 text-forest"></i>
          Data Pemesan
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
            <input 
              type="text" 
              id="customerName" 
              required
              placeholder="Masukkan nama Anda"
              class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-forest focus:border-transparent outline-none"
            >
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nomor WhatsApp</label>
            <input 
              type="tel" 
              id="customerPhone" 
              required
              placeholder="08xxxxxxxxxx"
              class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-forest focus:border-transparent outline-none"
            >
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit"
        class="w-full bg-forest text-white py-4 rounded-xl font-semibold text-lg hover:bg-forestLight transition shadow-lg"
      >
        Lanjut ke Pilih Menu →
      </button>

    </form>
  </main>

  <script src="js/reservation.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
