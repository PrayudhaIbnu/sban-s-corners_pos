<!-- Inventory -->
<section id="page-inventory" class="page hidden">
  <!-- Header -->
  <div class="flex items-end justify-between mb-8">
    <div>
      <h1 class="font-display text-5xl text-terra mt-2">Menu Inventory</h1>

      <p class="text-gray-500 mt-3">
        Manage menu availability and stock levels.
      </p>
    </div>

    <button onclick="openAddMenu()" class="btn-primary flex items-center gap-2">
      <i data-lucide="plus" class="w-4 h-4"></i>

      Add Menu
    </button>
  </div>

  <!-- Summary -->
  <div class="grid md:grid-cols-3 gap-6 mb-8">
    <div class="card-premium p-6">
      <p class="text-sm text-gray-400 uppercase">Total Menu</p>

      <h2 id="inventoryTotal" class="font-display text-4xl text-forest mt-2">
        0
      </h2>
    </div>

    <div class="card-premium p-6">
      <p class="text-sm text-gray-400 uppercase">Low Stock</p>

      <h2 id="inventoryLow" class="font-display text-4xl text-terra mt-2">0</h2>
    </div>

    <div class="card-premium p-6">
      <p class="text-sm text-gray-400 uppercase">Categories</p>

      <h2 id="inventoryCat" class="font-display text-4xl text-forest mt-2">
        0
      </h2>
    </div>
  </div>

  <!-- Menu Grid -->
  <div
    id="inventoryTable"
    class="grid md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
</section>
<div
  id="stockModal"
  class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl p-6 w-full max-w-md">
    <h3 id="stockModalTitle" class="font-display text-3xl text-forest">
      Update Stock
    </h3>

    <p class="text-gray-500 mt-2">Enter quantity.</p>

    <input
      id="stockQtyInput"
      type="number"
      min="1"
      value="1"
      class="w-full mt-5 border border-[#E5DDD3] rounded-xl px-4 py-3" />

    <div class="flex gap-3 mt-6">
      <button onclick="closeStockModal()" class="btn-secondary flex-1">
        Cancel
      </button>

      <button onclick="confirmStockUpdate()" class="btn-primary flex-1">
        Confirm
      </button>
    </div>
  </div>
</div>
<style>
  .card-premium {
    background: white;
    border: 1px solid #e9dfd5;
    border-radius: 24px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
  }

  .btn-primary {
    background: #0f4d21;
    color: white;
    padding: 14px 20px;
    border-radius: 16px;
  }

  .btn-secondary {
    border: 1px solid #d9cfc4;
    padding: 12px;
    border-radius: 16px;
    transition: 0.3s;
  }

  .btn-secondary:hover {
    background: #f7f3ee;
  }
</style>
