<!-- Orders Page -->
<section id="page-orders" class="page hidden">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div>
      <h1 class="font-brand text-2xl text-forest flex items-center gap-2">
        <i data-lucide="clipboard-list" class="w-6 h-6"></i>
        Manajemen Pesanan
      </h1>
      <p class="text-sm text-gray-500 mt-1">
        Kelola dan pantau semua pesanan yang masuk
      </p>
    </div>
    <button
      onclick="refreshOrders()"
      class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium hover:bg-cream transition">
      <i data-lucide="refresh-cw" class="w-4 h-4"></i>
      Refresh
    </button>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
    <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm">
      <div class="flex items-center justify-between mb-2">
        <div
          class="w-9 h-9 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center">
          <i data-lucide="inbox" class="w-4 h-4"></i>
        </div>
      </div>
      <p class="text-xs text-gray-500">Total Orders</p>
      <p class="font-brand text-xl font-bold text-forest" id="ordersTotalCount">
        0
      </p>
    </div>

    <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm">
      <div class="flex items-center justify-between mb-2">
        <div
          class="w-9 h-9 rounded-lg bg-orange-50 text-orange-600 flex items-center justify-center">
          <i data-lucide="hourglass" class="w-4 h-4"></i>
        </div>
      </div>
      <p class="text-xs text-gray-500">Pending</p>
      <p
        class="font-brand text-xl font-bold text-orange-600"
        id="ordersPendingCount">
        0
      </p>
    </div>

    <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm">
      <div class="flex items-center justify-between mb-2">
        <div
          class="w-9 h-9 rounded-lg bg-green-50 text-green-600 flex items-center justify-center">
          <i data-lucide="badge-check" class="w-4 h-4"></i>
        </div>
      </div>
      <p class="text-xs text-gray-500">Completed</p>
      <p
        class="font-brand text-xl font-bold text-green-600"
        id="ordersCompletedCount">
        0
      </p>
    </div>

    <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm">
      <div class="flex items-center justify-between mb-2">
        <div
          class="w-9 h-9 rounded-lg bg-terra/10 text-terra flex items-center justify-center">
          <i data-lucide="wallet" class="w-4 h-4"></i>
        </div>
      </div>
      <p class="text-xs text-gray-500">Revenue Today</p>
      <p class="font-brand text-xl font-bold text-forest" id="ordersRevenue">
        Rp 0
      </p>
    </div>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm mb-4">
    <div class="flex flex-wrap gap-3 items-center">
      <!-- Search -->
      <div class="relative flex-1 min-w-[200px]">
        <i
          data-lucide="search"
          class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input
          type="text"
          id="orderSearch"
          placeholder="Cari Order ID..."
          class="w-full pl-10 pr-4 py-2 bg-cream border border-gray-200 rounded-lg text-sm outline-none focus:border-forest"
          oninput="filterOrders()" />
      </div>

      <!-- ️ BARU: Order Type Filter -->
      <div class="relative">
        <i
          data-lucide="layers"
          class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
        <select
          id="orderTypeFilter"
          onchange="filterOrders()"
          class="pl-9 pr-8 py-2 bg-cream border border-gray-200 rounded-lg text-sm outline-none focus:border-forest appearance-none cursor-pointer">
          <option value="all">Semua Tipe</option>
          <option value="reservation">Reservasi</option>
          <option value="delivery">🚚 Delivery</option>
        </select>
        <i
          data-lucide="chevron-down"
          class="w-3.5 h-3.5 absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
      </div>

      <!-- Status Filter -->
      <div class="relative">
        <i
          data-lucide="filter"
          class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
        <select
          id="orderStatusFilter"
          onchange="filterOrders()"
          class="pl-9 pr-8 py-2 bg-cream border border-gray-200 rounded-lg text-sm outline-none focus:border-forest appearance-none cursor-pointer">
          <option value="all">Semua Status</option>
          <option value="pending">Pending</option>
          <option value="preparing">👨‍🍳 Preparing</option>
          <option value="ready">✅ Ready</option>
          <option value="completed">🎉 Completed</option>
          <option value="cancelled">❌ Cancelled</option>
        </select>
        <i
          data-lucide="chevron-down"
          class="w-3.5 h-3.5 absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
      </div>

      <!-- Payment Filter -->
      <div class="relative">
        <i
          data-lucide="credit-card"
          class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
        <select
          id="orderPaymentFilter"
          onchange="filterOrders()"
          class="pl-9 pr-8 py-2 bg-cream border border-gray-200 rounded-lg text-sm outline-none focus:border-forest appearance-none cursor-pointer">
          <option value="all">Semua Pembayaran</option>
          <option value="CASH">💵 Cash</option>
          <option value="QRIS">📱 QRIS</option>
        </select>
        <i
          data-lucide="chevron-down"
          class="w-3.5 h-3.5 absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
      </div>

      <!-- Date Filter -->
      <div class="relative">
        <i
          data-lucide="calendar"
          class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
        <select
          id="orderDateFilter"
          onchange="filterOrders()"
          class="pl-9 pr-8 py-2 bg-cream border border-gray-200 rounded-lg text-sm outline-none focus:border-forest appearance-none cursor-pointer">
          <option value="all">Semua Waktu</option>
          <option value="today">Hari Ini</option>
          <option value="week">7 Hari Terakhir</option>
          <option value="month">30 Hari Terakhir</option>
        </select>
        <i
          data-lucide="chevron-down"
          class="w-3.5 h-3.5 absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
      </div>
    </div>
  </div>

  <!-- Orders List -->
  <div id="ordersList" class="space-y-3"></div>
</section>

<!-- Order Detail Side Panel -->
<div
  id="orderDetailPanel"
  class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
  <!-- Panel Header -->
  <div
    class="bg-gradient-to-br from-forest to-forestLight px-6 py-5 text-white">
    <div class="flex items-center justify-between mb-3">
      <button
        onclick="closeOrderDetail()"
        class="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition"
        title="Tutup">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
      <div class="flex items-center gap-2">
        <button
          onclick="printOrderReceipt()"
          class="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition"
          title="Cetak Struk">
          <i data-lucide="printer" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
    <p
      class="text-white/60 text-xs uppercase tracking-wider flex items-center gap-1.5">
      <i data-lucide="file-text" class="w-3 h-3"></i>
      Order Detail
    </p>
    <h2 id="detailOrderId" class="font-brand text-2xl font-bold mt-1 font-mono">
      -
    </h2>
  </div>

  <!-- Panel Body -->
  <div id="orderDetailContent" class="flex-1 overflow-y-auto p-6 space-y-5">
    <!-- Will be populated by JS -->
  </div>

  <!-- Panel Footer -->
  <div id="orderDetailFooter" class="border-t border-gray-100 p-4 bg-cream">
    <!-- Will be populated by JS -->
  </div>
</div>

<!-- Overlay -->
<div
  id="orderDetailOverlay"
  onclick="closeOrderDetail()"
  class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden"></div>
<style>
  /* ===== ORDERS PAGE STYLES ===== */

  /* Status Badge - Icon based */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    border-radius: 9999px;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.2s ease;
  }

  .status-orange {
    background: #fff7ed;
    color: #c2410c;
    border: 1px solid #fed7aa;
  }

  .status-blue {
    background: #eff6ff;
    color: #1d4ed8;
    border: 1px solid #bfdbfe;
  }

  .status-green {
    background: #f0fdf4;
    color: #15803d;
    border: 1px solid #bbf7d0;
  }

  .status-forest {
    background: #f0fdf4;
    color: #1b4332;
    border: 1px solid #86efac;
  }

  .status-red {
    background: #fef2f2;
    color: #b91c1c;
    border: 1px solid #fecaca;
  }

  /* Order Card */
  .order-card {
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .order-card:hover {
    transform: translateY(-2px);
  }

  /* Arrow button animation */
  .order-card .arrow-btn {
    transition: all 0.25s ease;
  }

  .order-card:hover .arrow-btn {
    transform: translateX(3px);
    background: #1b4332;
    color: white;
  }

  /* Side Panel Animation */
  @keyframes slide-in-right {
    from {
      transform: translateX(100%);
    }
    to {
      transform: translateX(0);
    }
  }

  /* Scrollbar for side panel */
  #orderDetailContent::-webkit-scrollbar {
    width: 6px;
  }

  #orderDetailContent::-webkit-scrollbar-track {
    background: transparent;
  }

  #orderDetailContent::-webkit-scrollbar-thumb {
    background: #e5ddd3;
    border-radius: 3px;
  }

  #orderDetailContent::-webkit-scrollbar-thumb:hover {
    background: #1b4332;
  }

  /* Pulse animation untuk badge notifikasi */
  @keyframes pulse-badge {
    0%,
    100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.15);
    }
  }

  #ordersBadge:not(.hidden) {
    animation: pulse-badge 2s infinite;
  }

  /* Timeline status animation */
  .timeline-step {
    transition: all 0.3s ease;
  }

  .timeline-step.active {
    animation: pulse-ring 1.5s ease-out;
  }

  @keyframes pulse-ring {
    0% {
      box-shadow: 0 0 0 0 rgba(27, 67, 50, 0.4);
    }
    100% {
      box-shadow: 0 0 0 12px rgba(27, 67, 50, 0);
    }
  }

  /* Filter dropdown custom arrow */
  select {
    background-image: none;
  }

  /* Icon hover effect */
  .icon-hover {
    transition: all 0.2s ease;
  }

  .icon-hover:hover {
    transform: scale(1.1);
    color: #1b4332;
  }
</style>
