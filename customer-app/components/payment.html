<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembayaran - Sban's Corner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .font-brand { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-cream min-h-screen">
  
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="menu.html" class="flex items-center gap-2 text-forest">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        <span class="font-brand text-xl">SBAN'S CORNER</span>
      </a>
      <div class="flex items-center gap-2 text-sm text-gray-600">
        <i data-lucide="calendar" class="w-4 h-4"></i>
        <span>Step 3 of 4</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="font-brand text-3xl text-forest mb-2">Pembayaran</h1>
    <p class="text-gray-600 mb-8">Selesaikan pembayaran untuk konfirmasi reservasi</p>

    <!-- Order Summary -->
    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
      <h2 class="font-semibold text-lg mb-4">Ringkasan Pesanan</h2>
      <div id="orderSummary" class="space-y-3 mb-4">
        <!-- Will be generated by JS -->
      </div>
      <div class="border-t pt-4 space-y-2">
        <div class="flex justify-between text-sm">
          <span class="text-gray-600">Subtotal</span>
          <span id="subtotal">Rp 0</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-600">Tax (10%)</span>
          <span id="tax">Rp 0</span>
        </div>
        <div class="flex justify-between font-bold text-lg border-t pt-2">
          <span>Total</span>
          <span id="total" class="text-forest">Rp 0</span>
        </div>
      </div>
    </div>

    <!-- Payment Method -->
    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
      <h2 class="font-semibold text-lg mb-4">Metode Pembayaran</h2>
      <div class="space-y-3">
        <label class="flex items-center gap-3 p-4 border-2 rounded-xl cursor-pointer hover:border-forest transition payment-option" data-method="QRIS">
          <input type="radio" name="paymentMethod" value="QRIS" checked class="w-5 h-5 text-forest">
          <i data-lucide="qr-code" class="w-6 h-6 text-forest"></i>
          <div class="flex-1">
            <p class="font-semibold">QRIS</p>
            <p class="text-sm text-gray-600">Scan QR code untuk bayar</p>
          </div>
        </label>
        <label class="flex items-center gap-3 p-4 border-2 rounded-xl cursor-pointer hover:border-forest transition payment-option" data-method="TRANSFER">
          <input type="radio" name="paymentMethod" value="TRANSFER" class="w-5 h-5 text-forest">
          <i data-lucide="building-2" class="w-6 h-6 text-forest"></i>
          <div class="flex-1">
            <p class="font-semibold">Transfer Bank</p>
            <p class="text-sm text-gray-600">Transfer ke rekening kami</p>
          </div>
        </label>
      </div>
    </div>

    <!-- Payment Details -->
    <div id="paymentDetails" class="bg-white rounded-2xl p-6 shadow-sm mb-6">
      <!-- Will be updated based on payment method -->
    </div>

    <!-- Confirm Button -->
    <button onclick="confirmPayment()" class="w-full bg-terra text-white py-4 rounded-xl font-semibold text-lg hover:bg-terraLight transition shadow-lg">
      Konfirmasi Pembayaran ✓
    </button>
  </main>

  <style>
    .payment-option:has(input:checked) {
      border-color: #1B4332;
      background: #F0FDF4;
    }
  </style>

  <script src="js/payment.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
