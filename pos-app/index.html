<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sban's Corner POS</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>

    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              forest: "#0F4D21",
              forestLight: "#2D6A4F",

              cream: "#F7F3EE",
              creamDark: "#EFE7DE",

              terra: "#B6402A",
              terraLight: "#D55A42",

              charcoal: "#2F2A26",
            },

            fontFamily: {
              display: ["Playfair Display", "serif"],
              body: ["DM Sans", "sans-serif"],
            },

            borderRadius: {
              xl: "18px",
              "2xl": "24px",
            },

            boxShadow: {
              soft: "0 10px 40px rgba(0,0,0,.08)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="h-full bg-cream text-gray-800">
    <div id="app" class="h-full w-full flex overflow-auto">
      <!-- Components will be loaded here -->
      <div id="login-container"></div>

      <!-- ⚠️ PERBAIKAN: Tambahkan id="mainApp" di sini -->
      <div id="mainApp" class="h-full w-full flex hidden"></div>
      <!-- <div id="main-app-container" class="h-full w-full flex hidden"></div> -->
    </div>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <!-- Data -->
    <script src="../shared/data/products.js"></script>
    <script src="../shared/storage-bridge.js"></script>
    <script src="../shared/modal.js"></script>
    <!-- <script src="../shared/data/tables-data.json"></script> -->
    <script src="../shared/tables.js"></script>
    <script src="data/transactions.js"></script>

    <!-- JavaScript Modules -->
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/reservation.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/receipt.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/table-management.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
