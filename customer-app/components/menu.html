<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Menu - Sban's Corner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .font-brand { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-cream min-h-screen">
  
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="reservation.html" class="flex items-center gap-2 text-forest">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        <span class="font-brand text-xl">SBAN'S CORNER</span>
      </a>
      <div class="flex items-center gap-2 text-sm text-gray-600">
        <i data-lucide="calendar" class="w-4 h-4"></i>
        <span>Step 2 of 4</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="font-brand text-3xl text-forest mb-2">Pilih Menu</h1>
    <p class="text-gray-600 mb-8">Pre-order menu Anda (opsional)</p>

    <!-- Categories -->
    <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
      <button onclick="filterMenu('all')" class="cat-btn active-cat whitespace-nowrap">Semua</button>
      <button onclick="filterMenu('Food')" class="cat-btn whitespace-nowrap">Food</button>
      <button onclick="filterMenu('Snack')" class="cat-btn whitespace-nowrap">Snack</button>
      <button onclick="filterMenu('Beverage')" class="cat-btn whitespace-nowrap">Beverage</button>
    </div>

    <!-- Menu Grid -->
    <div id="menuGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
      <!-- Will be generated by JS -->
    </div>

    <!-- Cart Summary -->
    <div id="cartSummary" class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg p-4 hidden">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-600">Total Pesanan</p>
          <p class="text-xl font-bold text-forest" id="cartTotal">Rp 0</p>
        </div>
        <button onclick="proceedToPayment()" class="bg-forest text-white px-6 py-3 rounded-xl font-semibold hover:bg-forestLight transition">
          Lanjut ke Pembayaran →
        </button>
      </div>
    </div>
  </main>

  <style>
    .cat-btn {
      padding: 10px 20px;
      border: 1px solid #d9cfc4;
      background: white;
      color: #555;
      border-radius: 999px;
      transition: 0.3s;
    }
    .active-cat {
      background: #0f4d21;
      color: white;
      border-color: #0f4d21;
    }
  </style>

  <script src="js/menu.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
